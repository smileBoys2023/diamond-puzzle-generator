<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>菱形数字谜题 — 生成</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>菱形数字谜题</h1>
      <p class="subtitle">配置参数后生成题目，进入答题页填写空白格</p>
    </header>

    <main class="main">
      <section class="panel controls-panel">
        <h2>生成参数</h2>
        <form id="config-form" class="config-form">
          <div class="field-row">
            <label>第 5 行左端 <input type="number" name="edgeLeft" value="7" min="1" /></label>
            <label>第 5 行右二 <input type="number" name="penult" value="3" min="1" /></label>
            <label>第 5 行右端 <input type="number" name="edgeRight" value="5" min="1" /></label>
          </div>
          <div class="field-row">
            <label>第 4 行锚点 <input type="number" name="anchor4" value="16" min="1" /></label>
            <label>第 6 行锚点 <input type="number" name="anchor6" value="8" min="1" /></label>
            <label>第 7 行目标和 <input type="number" name="bottom" value="15" min="1" /></label>
          </div>
          <div class="field-row">
            <label>难度
              <select name="difficulty">
                <option value="easy">简单</option>
                <option value="medium" selected>中等</option>
                <option value="hard">困难</option>
              </select>
            </label>
          </div>
          <div class="actions">
            <button type="submit" class="btn primary">生成题目并开始答题</button>
          </div>
        </form>
        <div id="status" class="status" role="status"></div>
      </section>
    </main>

    <footer class="footer">
      <p>菱形数字谜题生成器 · <!-- <a href="calc.html" class="footer-link">计算器</a> --> </p>
    </footer>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
