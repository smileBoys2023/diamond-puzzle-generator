<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>菱形数字谜题 — 生成</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>菱形数字谜题</h1>
      <p class="subtitle">随机生成数值与已知格位置，进入答题页填写空白格</p>
    </header>

    <main class="main">
      <section class="panel controls-panel">
        <h2>生成题目</h2>
        <form id="config-form" class="config-form">
          <div class="field-row">
            <label>难度
              <select name="difficulty">
                <option value="easy">简单（数字较小，p、m ≤ 3）</option>
                <option value="medium" selected>中等</option>
                <option value="hard">困难（p、m ≥ 2）</option>
              </select>
            </label>
          </div>
          <p class="hint">每题固定给出<strong>必要锚点</strong>（第4/6行锚点、第5行边缘数、底目标和、顶部目标和），并保证唯一解；简单模式会额外揭示更多格子。</p>
          <div class="actions">
            <button type="submit" class="btn primary">随机生成并开始答题</button>
          </div>
        </form>
        <div id="status" class="status" role="status"></div>
      </section>
    </main>

    <footer class="footer">
      <p>菱形数字谜题生成器 · <a href="calc.html" class="footer-link">计算器</a></p>
    </footer>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
